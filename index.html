<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Drone Eğitim Platformu</title>
    <link rel="stylesheet" href="css/style.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<body>
    <div id="auth-screen" class="screen active">
        <div class="auth-bg-layer">
            <div class="auth-stars" id="auth-stars"></div>
            <div class="radar-container">
                <div class="radar-ring ring-1"></div>
                <div class="radar-ring ring-2"></div>
                <div class="radar-ring ring-3"></div>
                <div class="radar-sweep"></div>
                <div class="radar-dot dot-1"></div>
                <div class="radar-dot dot-2"></div>
                <div class="radar-dot dot-3"></div>
            </div>
            <div class="floating-aircraft ac-1">✈</div>
            <div class="floating-aircraft ac-2">✈</div>
            <div class="floating-aircraft ac-3">🚁</div>
            <div class="runway-lights">
                <span class="rw-light"></span><span class="rw-light"></span><span class="rw-light"></span>
                <span class="rw-light"></span><span class="rw-light"></span><span class="rw-light"></span>
                <span class="rw-light"></span><span class="rw-light"></span><span class="rw-light"></span>
                <span class="rw-light"></span><span class="rw-light"></span><span class="rw-light"></span>
            </div>
        </div>

        <div class="auth-container">
            <div class="auth-wings">
                <div class="wing wing-left"></div>
                <div class="auth-emblem">
                    <div class="emblem-ring">
                        <div class="emblem-inner">
                            <div class="emblem-icon">
                                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="drone-svg">
                                    <rect x="24" y="24" width="16" height="16" rx="4" fill="url(#droneGold)" stroke="#f0d78c" stroke-width="1"/>
                                    <circle cx="32" cy="32" r="4" fill="#0f172a" stroke="#f0d78c" stroke-width="0.8"/>
                                    <circle cx="32" cy="32" r="2" fill="#06b6d4" opacity="0.8"/>
                                    <line x1="26" y1="26" x2="14" y2="14" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
                                    <line x1="38" y1="26" x2="50" y2="14" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
                                    <line x1="26" y1="38" x2="14" y2="50" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
                                    <line x1="38" y1="38" x2="50" y2="50" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
                                    <circle cx="14" cy="14" r="8" fill="none" stroke="#f0d78c" stroke-width="1" opacity="0.5" class="prop prop-1"/>
                                    <circle cx="50" cy="14" r="8" fill="none" stroke="#f0d78c" stroke-width="1" opacity="0.5" class="prop prop-2"/>
